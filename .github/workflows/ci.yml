name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust:
    name: Rust (build + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run trizaval-core tests
        run: cargo test --package trizaval-core --verbose

      - name: Build trizaval-cli
        run: cargo build --package trizaval-cli --verbose

      - name: Release build sanity check
        run: cargo build --release --workspace --exclude trizaval-py --verbose

  python:
    name: Python (build + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Cache cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-py-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-py-

      - name: Create virtual environment
        run: python -m venv .venv

      - name: Install maturin and test dependencies
        run: |
          source .venv/bin/activate
          pip install maturin pytest pytest-mock pydantic pyyaml openai anthropic pyarrow duckdb pytz

      - name: Build and install trizaval extension
        working-directory: crates/trizaval-py
        run: |
          source ../../.venv/bin/activate
          maturin develop

      - name: Run pytest suite
        run: |
          source .venv/bin/activate
          pytest tests/python/ -v

  dashboard:
    name: Dashboard (build WASM + build React app)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-wasm-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-wasm-

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: "latest"

      - name: Build trizaval-wasm
        working-directory: crates/trizaval-wasm
        run: wasm-pack build --target web --out-dir ../../dashboard/wasm

      - name: Install dashboard dependencies
        working-directory: dashboard
        run: npm ci

      - name: Build dashboard
        working-directory: dashboard
        run: npm run build

  r-bindings:
    name: R bindings (build + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "release"

      - name: Install system dependencies for R packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libuv1-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            libharfbuzz-dev \
            libfribidi-dev \
            libjpeg-dev \
            libpng-dev \
            libtiff5-dev \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev

      - name: Get R library path
        id: r-lib-path
        run: echo "path=$(Rscript -e 'cat(.libPaths()[1])')" >> "$GITHUB_OUTPUT"

      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ${{ steps.r-lib-path.outputs.path }}
          key: ${{ runner.os }}-r-${{ hashFiles('bindings/r/trizavalr/DESCRIPTION') }}
          restore-keys: |
            ${{ runner.os }}-r-

      - name: Cache cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            bindings/r/trizavalr/src/rust/target
          key: ${{ runner.os }}-cargo-r-${{ hashFiles('bindings/r/trizavalr/src/rust/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-r-

      - name: Install R package dependencies
        working-directory: bindings/r/trizavalr
        run: |
          Rscript -e 'install.packages(c("devtools", "testthat", "rextendr"), repos = "https://cloud.r-project.org")'

      - name: Build and test trizavalr
        working-directory: bindings/r/trizavalr
        run: |
          Rscript -e 'devtools::test()'
          