name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust:
    name: Rust (build + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run trizaval-core tests
        run: cargo test --package trizaval-core --verbose

      - name: Build trizaval-cli
        run: cargo build --package trizaval-cli --verbose

      - name: Release build sanity check
        run: cargo build --release --workspace --exclude trizaval-py --verbose

  python:
    name: Python (build + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Cache cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-py-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-py-

      - name: Create virtual environment
        run: python -m venv .venv
      - name: Install maturin and test dependencies
        run: |
          source .venv/bin/activate
          pip install maturin pytest pytest-mock pydantic pyyaml openai anthropic pyarrow duckdb pytz

      - name: Build and install trizaval extension
        working-directory: crates/trizaval-py
        run: |
          source ../../.venv/bin/activate
          maturin develop

      - name: Run pytest suite
        run: |
          source .venv/bin/activate
          pytest tests/python/ -v